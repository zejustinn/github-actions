name: Workflow which has scope variables

on:
    workflow_dispatch: 
env:
    WORKFLOW_VAR: WORKFLOW_VAR_WAS_USED_HERE

jobs:
    job-1:
        runs-on: ubuntu-24.04
        env:
            JOB_1_VAR: JOB_1_VAR_WAS_USED_HERE
        steps:
            - name: Job 1 > Step 1
              env:
                STEP_1_VAR: STEP_1_VAR_WAS_USED_HERE
              run: |
                echo "WORKFLOW_VAR: $WORKFLOW_VAR"
                echo "JOB_1_VAR:    $JOB_1_VAR"
                echo "STEP_1_VAR:   $STEP_1_VAR"
            - name: Job 1 > Step 2
              run: |
                echo "WORKFLOW_VAR: $WORKFLOW_VAR"
                echo "JOB_1_VAR:    $JOB_1_VAR"
                echo "STEP_1_VAR:   $STEP_1_VAR"
    job-2:
        runs-on: ubuntu-24.04
        steps:
            - name: Job 2 > Step 1
              run: |
                echo "WORKFLOW_VAR: $WORKFLOW_VAR"
                echo "JOB_1_VAR:    $JOB_1_VAR"
                echo "STEP_1_VAR:   $STEP_1_VAR"
        
